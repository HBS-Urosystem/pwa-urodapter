[build]
	command = "npm run build"
	publish = "build"

# Immutable asset caching for `/_app/immutable/*` is appended to `build/_headers` by
# `@sveltejs/adapter-netlify` (lowercase `cache-control`). Do not duplicate that here —
# Netlify merges `netlify.toml` and `_headers`, which triggers "same header set twice
# with different cases" (Cache-Control vs cache-control).

[[headers]]
	for = "/manifest.webmanifest"
	[headers.values]
		"cache-control" = "public, max-age=3600"
