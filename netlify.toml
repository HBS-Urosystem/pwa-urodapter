[build]
	command = "npm run build"
	publish = "build"

# SvelteKit + Netlify adapter: long-cache immutable build assets
[[headers]]
	for = "/_app/immutable/*"
	[headers.values]
		Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
	for = "/manifest.webmanifest"
	[headers.values]
		Cache-Control = "public, max-age=3600"
